<!DOCTYPE html>
<html>
<head>
  <style>
    body {
      width: 260px;
      padding: 16px;
      margin: 0;
      font-family: 'Segoe UI', Roboto, Arial, sans-serif;
      font-size: 13px;
      color: #e8eaed;
      background: #202124;
    }
    h3 {
      margin: 0 0 12px;
      font-size: 14px;
      font-weight: 500;
    }
    label {
      display: flex;
      align-items: flex-start;
      gap: 8px;
      cursor: pointer;
      line-height: 1.4;
    }
    input[type="checkbox"] {
      margin-top: 2px;
      accent-color: #3ea6ff;
    }
    .description {
      color: #9aa0a6;
      font-size: 11px;
      margin-top: 4px;
      margin-left: 24px;
    }
  </style>
</head>
<body>
  <h3>YouTube Tab Fullscreen</h3>
  <label>
    <input type="checkbox" id="interceptDoubleClick">
    <span>Intercept double-click on video</span>
  </label>
  <div class="description">Double-clicking the video triggers tab fullscreen instead of native fullscreen</div>
  <script src="popup.js"></script>
</body>
</html>
